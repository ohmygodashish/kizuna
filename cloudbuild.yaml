steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/business-card-parser'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/business-card-parser']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'business-card-parser'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/business-card-parser'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CREDENTIALS_BASE64=${_GOOGLE_CREDENTIALS_BASE64}'
      - '--set-env-vars'
      - 'GOOGLE_SHEET_ID=${_GOOGLE_SHEET_ID}'
      - '--set-env-vars'
      - 'GOOGLE_DRIVE_FOLDER_ID=${_GOOGLE_DRIVE_FOLDER_ID}'
      - '--set-env-vars'
      - 'OPENAI_API_KEY=${_OPENAI_API_KEY}'
    secretEnv: ['_GOOGLE_CREDENTIALS_BASE64', '_OPENAI_API_KEY']

images:
  - 'gcr.io/${PROJECT_ID}/business-card-parser'

# For production, store secrets in Secret Manager
availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_NUMBER}/secrets/google-credentials-base64/versions/latest
    env: '_GOOGLE_CREDENTIALS_BASE64'
  - versionName: projects/${PROJECT_NUMBER}/secrets/openai-api-key/versions/latest
    env: '_OPENAI_API_KEY'

# Non-sensitive substitutions (you can also store these in Secret Manager if preferred)
substitutions:
  _GOOGLE_SHEET_ID: 'your-google-sheet-id-here'
  _GOOGLE_DRIVE_FOLDER_ID: 'your-google-drive-folder-id-here'
